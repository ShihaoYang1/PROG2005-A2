<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System - Part 1</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>📦 Inventory Management System</h1>
        <p>TypeScript Version | Author: Yang Shihao (202300408097)</p>
    </header>

    <main class="container">
        <!-- Message display area -->
        <div id="message-area"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showSection('add-section')">Add Item</button>
            <button class="tab-btn" onclick="showSection('manage-section')">Manage Items</button>
            <button class="tab-btn" onclick="showSection('search-section')">Search</button>
            <button class="tab-btn" onclick="showSection('view-section')">View All</button>
        </div>

        <!-- Add Item -->
        <section id="add-section" class="tab-content active">
            <h2>➕ Add New Item</h2>
            <form id="add-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="item-id">Item ID *</label>
                        <input type="text" id="item-id" required placeholder="Unique identifier">
                    </div>
                    <div class="form-group">
                        <label for="item-name">Item Name *</label>
                        <input type="text" id="item-name" required placeholder="Item name">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" required>
                            <option value="">Select category</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Tools">Tools</option>
                            <option value="Miscellaneous">Miscellaneous</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="supplier">Supplier *</label>
                        <input type="text" id="supplier" required placeholder="Supplier name">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="quantity">Quantity *</label>
                        <input type="number" id="quantity" required min="0" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="price">Price *</label>
                        <input type="number" id="price" required min="0" step="0.01" placeholder="0.00">
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="is-popular">
                        <span>Mark as Popular Item</span>
                    </label>
                </div>

                <div class="form-group">
                    <label for="comment">Comment (Optional)</label>
                    <textarea id="comment" rows="2" placeholder="Add a comment..."></textarea>
                </div>

                <button type="submit" class="btn-primary">Add Item</button>
            </form>
        </section>

        <!-- Manage Items (Update/Delete) -->
        <section id="manage-section" class="tab-content">
            <h2>📝 Update Item</h2>
            <div class="form-group">
                <label>Item Name to Update *</label>
                <input type="text" id="update-name" placeholder="Enter current name">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>New Name</label>
                    <input type="text" id="update-new-name" placeholder="Leave blank to keep unchanged">
                </div>
                <div class="form-group">
                    <label>New Quantity</label>
                    <input type="number" id="update-quantity" min="0" placeholder="Leave blank to keep unchanged">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>New Price</label>
                    <input type="number" id="update-price" min="0" step="0.01" placeholder="Leave blank to keep unchanged">
                </div>
                <div class="form-group">
                    <label>New Supplier</label>
                    <input type="text" id="update-supplier" placeholder="Leave blank to keep unchanged">
                </div>
            </div>
            <button id="update-btn" class="btn-warning">Update Item</button>

            <hr>

            <h2>🗑️ Delete Item</h2>
            <div class="form-group">
                <label>Item Name to Delete *</label>
                <input type="text" id="delete-name" placeholder="Enter item name">
                <small class="hint">⚠️ Confirmation will be required before deletion</small>
            </div>
            <button id="delete-btn" class="btn-danger">Delete Item</button>
        </section>

        <!-- Search -->
        <section id="search-section" class="tab-content">
            <h2>🔍 Search Items</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Enter keyword...">
                <button id="search-btn" class="btn-primary">Search</button>
            </div>
            <div id="search-results"></div>
        </section>

        <!-- View All -->
        <section id="view-section" class="tab-content">
            <h2>📋 Inventory Overview</h2>
            <div class="action-bar">
                <button id="all-btn" class="btn-secondary">Show All</button>
                <button id="popular-btn" class="btn-secondary">Show Popular Only</button>
            </div>
            <div id="items-container"></div>
        </section>
    </main>

    <footer>
        <p>PROG2005 Programming Mobile Systems | Assessment 2 Part 1</p>
    </footer>

    <script type="module" src="dist/app.js"></script>
    <script>
        // Simple tab switching function
        function showSection(sectionId) {
            // Hide all sections
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Show selected section
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
